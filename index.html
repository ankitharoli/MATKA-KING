<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A1 KING 👑 - Live Matka Results</title>
  <style>
    :root {
      --gold: #ffd700;
      --neon: #00ff9d;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #eee;
      min-height: 100vh;
      background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://source.unsplash.com/random/1920x1080/?dark,abstract');
      background-size: cover;
    }
    .header {
      text-align: center;
      padding: 25px 15px;
      background: rgba(0,0,0,0.85);
      border-bottom: 3px solid var(--gold);
    }
    .title {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px var(--gold), 0 0 50px #ff00ff;
    }
    .subtitle { color: var(--neon); margin-top: 8px; font-size: 1.1rem; }

    .live-clock {
      font-size: 2rem;
      font-weight: bold;
      color: var(--neon);
      margin: 15px 0;
      text-shadow: 0 0 15px var(--neon);
    }

    .active-card {
      margin: 20px 15px;
      padding: 25px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 3px solid var(--gold);
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(255,215,0,0.6);
    }

    .game-list {
      margin: 20px 15px;
    }
    .game-item {
      background: rgba(255,255,255,0.05);
      padding: 18px;
      margin: 10px 0;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid var(--gold);
    }
    .active { 
      border-left-color: var(--neon);
      background: rgba(0,255,150,0.1);
      box-shadow: 0 0 25px var(--neon);
      animation: glow 2s infinite alternate;
    }
    @keyframes glow { from { box-shadow: 0 0 15px var(--neon); } to { box-shadow: 0 0 35px var(--neon); } }

    .admin-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      font-size: 1rem;
      z-index: 1000;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    .whatsapp {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #25D366;
      padding: 15px 25px;
      border-radius: 50px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 25px #25D366;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="title">A1 KING 👑</h1>
    <p class="subtitle">by Ankit Stalish • Live Matka Results</p>
    <div class="live-clock" id="clock">00:00:00</div>
  </div>

  <!-- Active Game -->
  <div class="active-card" id="activeCard">
    <h2 id="activeGameName">Loading...</h2>
    <h3 id="countdown" style="color:#00ff9d; font-size:1.8rem; margin:15px 0;"></h3>
  </div>

  <!-- All Games -->
  <div class="game-list" id="gameList"></div>

  <!-- Admin -->
  <div class="admin-btn" onclick="openAdminPanel()">🔐 ADMIN PANEL</div>
  <a href="https://wa.me/919xxxxxxxxx" class="whatsapp" target="_blank">💬 WhatsApp Manjeet</a>

<script>
// ====================== GAMES DATA ======================
let games = [
  {name: "JAIPUR MATKA", time: "12:55"},
  {name: "SADAR BAZAR", time: "13:30"},
  {name: "GWALIOR", time: "14:30"},
  {name: "DELHI BAZAR", time: "15:00"},
  {name: "SHREE GANESH", time: "16:25"},
  {name: "SURAT BAZAR", time: "17:25"},
  {name: "FARIDABAD", time: "17:55"},
  {name: "FARIDKOT", time: "19:30"},
  {name: "GAZIABAD", time: "21:30"},
  {name: "DWARKA", time: "22:25"},
  {name: "GALI", time: "23:30"},
  {name: "DISAWAR", time: "01:30"}
];

// Load / Save Results
let results = JSON.parse(localStorage.getItem('matkaResults')) || {};

// Render Games
function renderGames() {
  const container = document.getElementById('gameList');
  container.innerHTML = `<h2 style="text-align:center; margin:20px; color:gold;">Today's Games</h2>`;

  games.forEach(game => {
    const res = results[game.name] || "---";
    const div = document.createElement('div');
    div.className = `game-item ${Math.random() > 0.7 ? 'active' : ''}`;
    div.innerHTML = `
      <div>
        <strong>${game.name}</strong><br>
        <small>${game.time}</small>
      </div>
      <div style="text-align:right; font-size:1.4rem; color:gold;">
        ${res}
      </div>
    `;
    container.appendChild(div);
  });
}

// Live Clock
function startClock() {
  setInterval(() => {
    const time = new Date().toLocaleTimeString('en-IN', {hour12:false});
    document.getElementById('clock').textContent = time;
  }, 1000);
}

// Admin Panel
function openAdminPanel() {
  const pass = prompt("Enter Admin Password:");
  if (pass !== "ankit123") {  // ← Yahan password change kar sakte ho
    alert("❌ Wrong Password");
    return;
  }

  let html = `<h2>Admin Panel - Update Results</h2>`;
  games.forEach(g => {
    const current = results[g.name] || "";
    html += `
      <p><strong>\( {g.name} ( \){g.time})</strong><br>
      <input type="text" id="inp-\( {g.name}" value=" \){current}" style="width:90%; padding:8px; font-size:1.1rem;">
      </p>`;
  });
  html += `<br><button onclick="saveAllResults()" style="padding:12px 30px; font-size:1.1rem;">SAVE ALL</button>`;

  const win = window.open("", "_blank", "width=420,height=700");
  win.document.write(html);
}

function saveAllResults() {
  games.forEach(g => {
    const val = document.getElementById(`inp-${g.name}`).value;
    if (val) results[g.name] = val;
  });
  localStorage.setItem('matkaResults', JSON.stringify(results));
  alert("✅ Results Saved Successfully!");
  window.opener.location.reload(); // Refresh main window
}

// Initialize
startClock();
renderGames();
</script>
</body>
</html>
